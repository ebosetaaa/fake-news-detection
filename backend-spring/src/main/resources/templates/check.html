<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Analyze Article</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Analyze an Article</h2>
    <form action="/api/predict-form" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium">Article Text</label>
            <textarea name="text" required rows="8" class="w-full border rounded p-2"></textarea>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <label class="block">
                Shares
                <input name="shares" type="number" value="0" class="w-full border rounded p-2">
            </label>
            <label class="block">
                Likes
                <input name="likes" type="number" value="0" class="w-full border rounded p-2">
            </label>
            <label class="block">
                Comments
                <input name="comments" type="number" value="0" class="w-full border rounded p-2">
            </label>
        </div>

        <div>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Analyze</button>
        </div>
    </form>
</div>
</body>
</html>
