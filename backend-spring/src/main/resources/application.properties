spring.application.name=fake_news_detection
# server
server.port=8080

# Use H2 for development (no external DB required)
spring.datasource.url=jdbc:h2:mem:fakenewsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Thymeleaf cache off for dev
spring.thymeleaf.cache=false
